name: WM-Tipps Update

on:
  schedule:
    # Stuendlich 13:00-21:00 deutscher Zeit (UTC 11-19). Der Roboter "feuert"
    # aber nur EINMAL pro Tag (~3 Std. vor dem ersten Spiel, spaetestens 21:00);
    # alle anderen Aufrufe brechen sofort und kostenlos ab.
    - cron: "0 11-19 * * *"
  workflow_dispatch: {}   # erlaubt manuelles Starten ("Run workflow")

permissions:
  contents: write

concurrency:
  group: wm-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten
        run: pip install google-genai

      - name: Tipps aktualisieren
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python update_bot.py --force
          else
            python update_bot.py
          fi

      - name: Aenderungen committen & pushen
        run: |
          if git diff --quiet -- data.js; then
            echo "Keine Aenderung an data.js."
          else
            git config user.name "WM-Tipps Bot"
            git config user.email "actions@github.com"
            git add data.js
            git commit -m "Auto-Update Tipps $(TZ=Europe/Berlin date '+%d.%m.%Y %H:%M')"
            git push
          fi
