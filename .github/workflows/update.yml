name: WM-Tipps Update

on:
  schedule:
    # Stuendlich 13:00-21:00 deutscher Zeit (UTC 11-19). Der Roboter "feuert"
    # aber nur EINMAL pro Tag (~3 Std. vor dem ersten Spiel, spaetestens 21:00);
    # alle anderen Aufrufe brechen sofort und kostenlos ab.
    - cron: "0 11-19 * * *"
  workflow_dispatch: {}   # erlaubt manuelles Starten ("Run workflow")

permissions:
  contents: write   # Commit von data.js
  pages: write      # Veroeffentlichung
  id-token: write   # Deploy-Authentifizierung

concurrency:
  group: wm-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten
        run: pip install google-genai

      - name: Tipps aktualisieren
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python update_bot.py --force
          else
            python update_bot.py
          fi

      - name: Aenderung committen
        id: commit
        run: |
          if git diff --quiet -- data.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Keine Aenderung an data.js."
          else
            git config user.name "WM-Tipps Bot"
            git config user.email "actions@github.com"
            git add data.js
            git commit -m "Auto-Update Tipps $(TZ=Europe/Berlin date '+%d.%m.%Y %H:%M')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Seite vorbereiten
        if: steps.commit.outputs.changed == 'true'
        run: |
          mkdir -p _site
          cp index.html data.js manifest.webmanifest icon.svg wm2026-erinnerungen.ics _site/ 2>/dev/null || true

      - name: Pages konfigurieren
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Artefakt hochladen
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Auf GitHub Pages veroeffentlichen
        if: steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
